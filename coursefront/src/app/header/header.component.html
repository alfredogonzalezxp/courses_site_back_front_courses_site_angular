<header class="fixed top-0 inset-x-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200/60 sticky">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">

      <!-- Logo and Nav -->
      <div class="flex items-center gap-8">
        <a routerLink="/" class="flex items-center gap-2.5 transition-opacity hover:opacity-80">
          <div
            class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-md shadow-indigo-600/20">
            D
          </div>
          <span class="text-lg font-bold text-slate-900 tracking-tight">DevCourses</span>
        </a>

        <nav *ngIf="authService.isLoggedIn$ | async" class="hidden md:flex items-center space-x-1">
          <a routerLink="/dashboard" routerLinkActive="bg-indigo-50 text-indigo-700"
            [routerLinkActiveOptions]="{exact: true}"
            class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-all duration-200">
            Dashboard
          </a>
          <a routerLink="/users" routerLinkActive="bg-indigo-50 text-indigo-700"
            [routerLinkActiveOptions]="{exact: true}"
            class="px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-all duration-200">
            Manage Users
          </a>
        </nav>
      </div>

      <!-- User Actions -->
      <div *ngIf="authService.isLoggedIn$ | async" class="flex items-center gap-4">
        <div class="hidden sm:flex flex-col items-end mr-2">
          <span class="text-sm font-semibold text-slate-700 leading-tight">{{ authService.currentUser?.nombre }}</span>
          <span class="text-xs text-slate-400">Admin</span>
        </div>
        <button (click)="logout()"
          class="inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm hover:shadow focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200">
          Logout
        </button>
      </div>

    </div>
  </div>
</header>
