<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div
    class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-xl border border-gray-100 transition-opacity duration-300"
    [class.animate-fade-in-up]="shouldAnimate">
    <div class="text-center">
      <div
        class="mx-auto h-12 w-12 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/20 mb-6">
        <span class="text-white font-bold text-xl">D</span>
      </div>
      <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Welcome back</h2>
      <p class="mt-2 text-sm text-slate-500">
        Sign in to access your dashboard
      </p>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <!-- Error Alert -->
      <div *ngIf="errorMessage" class="rounded-lg bg-red-50 p-4 border border-red-100 flex items-start gap-3">
        <div class="flex-shrink-0 text-red-400">
          <!-- 
        SVG (Scalable Vector Graphics): An image made of math/code instead of pixels.
        - Scalable: Stays sharp at any size.
        - h-5 w-5: Tailwind classes to set the size.
        - viewBox: Defines the internal coordinate system (20x20).
        - fill="currentColor": Uses the color of the surrounding text (red-400 here).
      -->
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
              clip-rule="evenodd" />
          </svg>
        </div>
        <div class="text-sm text-red-700">
          {{ errorMessage }}
        </div>
      </div>

      <div class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
          <input id="email" type="email" formControlName="email"
            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all duration-200"
            placeholder="you@example.com">
          <!-- 
            Validation Guard for Email:
            1. invalid: Is the email wrong (e.g., empty or no @)?
            2. dirty: Has the user typed anything?
            3. touched: Has the user clicked in and out of the field?
            This prevents showing errors immediately on page load.
          -->
          <div
            *ngIf="loginForm.get('email')?.invalid && (loginForm.get('email')?.dirty || loginForm.get('email')?.touched)"
            class="mt-1 text-xs text-red-600">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Invalid email format</span>
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input id="password" type="password" formControlName="password"
            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all duration-200"
            placeholder="••••••••">
          <!-- 
            Validation Guard for Password:
            Ensures the user has actually interacted with the password field
            before showing the "Required" error.
          -->
          <div
            *ngIf="loginForm.get('password')?.invalid && (loginForm.get('password')?.dirty || loginForm.get('password')?.touched)"
            class="mt-1 text-xs text-red-600">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
          </div>
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="loginForm.invalid"
          class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:bg-indigo-400 disabled:cursor-not-allowed shadow-md shadow-indigo-600/20 transition-all duration-200">
          Sign In
        </button>
      </div>

      <div class="text-center">
        <p class="text-sm text-slate-500">
          Don't have an account?
          <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500 hover:underline">Sign up for free</a>
        </p>
      </div>
    </form>
  </div>
</div>
