name: Full-Stack CI/CD Pipeline

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  backend-test:
    name: Backend CI (Java 21)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: appdbang
          POSTGRES_USER: adminbckang
          POSTGRES_PASSWORD: StrongPassw0rd-2029!
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run Backend Tests
        working-directory: ./courseback
        env:
          DB_URL: jdbc:postgresql://localhost:5433/appdbang
          DB_USER: adminbckang
          DB_PASSWORD: StrongPassw0rd-2029!
        run: chmod +x mvnw && ./mvnw clean test

      - name: Build Backend JAR
        working-directory: ./courseback
        run: ./mvnw clean package -DskipTests

  frontend-test:
    name: Frontend CI (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./coursefront/package-lock.json"

      - name: Install Frontend Dependencies
        working-directory: ./coursefront
        run: npm install --legacy-peer-deps

      - name: Run Frontend Tests (Vitest)
        working-directory: ./coursefront
        run: npm test -- --reporters=verbose --watch=false

      - name: Build Frontend Application
        working-directory: ./coursefront
        run: npm run build

  docker-check:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose Build
        run: docker compose build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [frontend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./coursefront/package-lock.json"

      - name: Build Frontend for GitHub Pages
        working-directory: ./coursefront
        run: |
          npm install --legacy-peer-deps
          npm run build -- --configuration production --base-href /courses_site_back_front_courses_site_angular/ --deploy-url /courses_site_back_front_courses_site_angular/

          # Dynamic Path Detection: Find the folder containing index.html
          # We search inside coursefront/dist/
          INDEX_FILE=$(find dist -name "index.html" | head -n 1)
          if [ -z "$INDEX_FILE" ]; then
            echo "ERROR: index.html not found in dist folder!"
            ls -R dist
            exit 1
          fi

          INDEX_DIR=$(dirname "$INDEX_FILE")
          echo "Found index.html in: $INDEX_DIR"

          # Create 404.html fallback for Angular routing
          cp "$INDEX_FILE" "$INDEX_DIR/404.html"

          # Export the folder path for the Deployment step
          # Note: Deployment step needs path relative to repo root
          echo "DEPLOY_PATH=coursefront/$INDEX_DIR" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ${{ env.DEPLOY_PATH }}
          branch: gh-pages
